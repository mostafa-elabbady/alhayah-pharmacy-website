<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية الحياة | Alhayah Pharmacy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark-green: #0b4b36;
            --secondary-green: #2a7a2a;
            --background-gradient: linear-gradient(135deg, #f0f7f4 0%, #dcf0e2 100%);
            --text-dark: #1a251f;
            --card-bg: rgba(255, 255, 255, 0.98);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: var(--background-gradient);
            color: var(--text-dark);
            font-family: 'Cairo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrollable mobile viewports */
            overflow-x: hidden;
            position: relative;
        }

        /* Responsive Background Accents */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 40vw;
            height: 40vw;
            max-width: 300px;
            max-height: 300px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.06);
            z-index: -1;
            animation: float 8s infinite ease-in-out alternate;
        }
        body::before { top: 2%; right: -5%; }
        body::after { bottom: 2%; left: -5%; animation-delay: -4s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(15px) scale(1.05); }
        }

        .container {
            background: var(--card-bg);
            width: 92%; /* Uses fluid percentage to consume optimal screen width on mobile */
            max-width: 460px; /* Locks growth on wider screens or tablets */
            margin: 25px auto;
            padding: 35px 20px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(11, 75, 54, 0.07);
            text-align: center;
            border-top: 6px solid var(--primary-dark-green);
            backdrop-filter: blur(10px);
            
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-item {
            opacity: 0;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }

        .logo {
            width: 130px;
            height: 130px;
            object-fit: contain;
            margin: 0 auto 15px auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary-dark-green);
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #556b5f;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .services-list {
            text-align: right;
            background-color: #ffffff;
            padding: 18px 16px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(11, 75, 54, 0.08);
            position: relative;
            overflow: hidden;
        }

        .services-list::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary-dark-green);
        }

        .services-list p {
            margin: 12px 0;
            color: var(--text-dark);
            font-size: 14.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            line-height: 1.5;
        }

        .services-list i {
            color: var(--secondary-green);
            margin-left: 12px;
            font-size: 16px;
            width: 20px;
            text-align: center;
            flex-shrink: 0; /* Prevents icons from turning oval on text wrap */
        }

        /* Flexbox Action Buttons Layout */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            font-size: 16.5px;
            font-weight: 700;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn i {
            margin-left: 12px;
            font-size: 18px;
        }

        .btn-call { background: linear-gradient(135deg, var(--primary-dark-green), #083828); }
        .btn-facebook { background: linear-gradient(135deg, #1877F2, #145dbf); }
        .btn-map { background: linear-gradient(135deg, #EA4335, #c53023); }
        
        .btn-whatsapp { 
            background: linear-gradient(135deg, #25D366, #1da851); 
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Seamless Map Frame */
        .map-container {
            width: 100%;
            height: 200px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #e8f0eb;
        }
        
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .footer-address {
            font-size: 13.5px;
            font-weight: 700;
            color: #667c70;
            line-height: 1.6;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 18px;
        }

        /* Clean Smartphone Adaptations */
        @media (max-width: 480px) {
            body {
                padding: 5px 0;
            }
            .container {
                padding: 25px 16px;
                margin: 15px auto;
                border-radius: 20px;
            }
            h1 { font-size: 23px; }
            .subtitle { margin-bottom: 20px; }
            .services-list p { font-size: 13.5px; }
            .btn { font-size: 15.5px; padding: 13px 16px; }
            .map-container { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="animate-item">
            <img src="Code_Generated_Image.png" alt="Alhayah Pharmacy Logo" class="logo">
            <h1>صيدلية الحياة</h1>
            <div class="subtitle">Alhayah Pharmacy</div>
        </div>

        <div class="services-list animate-item delay-1">
            <p><i class="fa-solid fa-hands-holding-child"></i> صحتك وصحة عائلتك في أيدٍ أمينة</p>
            <p><i class="fa-solid fa-heart-pulse"></i> قياس الضغط والسكر والوزن مجاناً</p>
            <p><i class="fa-solid fa-user-doctor"></i> طبيبك الصيدلي معك أينما كنت ..</p>
            <p><i class="fa-solid fa-house-medical-circle-check"></i> استشرنا وتصلك طلبيتك حتى باب بيتك</p>
        </div>

        <div class="btn-group animate-item delay-2">
            <a href="tel:+201024282500" class="btn btn-call">
                <i class="fa-solid fa-phone"></i> اتصل بنا الآن
            </a>
            
            <a href="https://wa.me/201024282500" class="btn btn-whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> تواصل عبر واتساب
            </a>

            <a href="https://fb.me/Alhayah.Pharmacy" class="btn btn-facebook" target="_blank">
                <i class="fa-brands fa-facebook-f"></i> صفحتنا على فيسبوك
            </a>

            <a href="https://maps.app.goo.gl/1E3LmN6cdfA2186G7" class="btn btn-map" target="_blank">
                <i class="fa-solid fa-location-dot"></i> احصل على الاتجاهات
            </a>
        </div>

        <div class="map-container animate-item delay-3">
            <iframe 
                src="https://maps.google.com/maps?q=31.30687827460859,31.140829625298146&t=&z=16&ie=UTF8&iwloc=&output=embed" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <div class="footer-address animate-item delay-4">
            كفرالشيخ - الحامول<br>
            امام فرقة أمن الحامول
        </div>
    </div>

</body>
</html>
