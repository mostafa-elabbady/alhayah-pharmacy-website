<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية الحياة | Alhayah Pharmacy</title>
    
    <!-- Google Fonts for Professional Arabic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for the Button Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-dark-green: #0b4b36;
            --secondary-green: #2a7a2a;
            --background-gradient: linear-gradient(135deg, #f0f7f4 0%, #dcf0e2 100%);
            --text-dark: #1a251f;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--background-gradient);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.1);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        body::before { top: -100px; right: -100px; }
        body::after { bottom: -100px; left: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        .container {
            background: var(--card-bg);
            max-width: 550px;
            width: 100%;
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(11, 75, 54, 0.08);
            text-align: center;
            border-top: 6px solid var(--primary-dark-green);
            backdrop-filter: blur(10px);
            
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-item {
            opacity: 0;
            animation: slideUpFade 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }

        .logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 20px;
            border-radius: 50%;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: transform 0.5s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        h1 {
            color: var(--primary-dark-green);
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #556b5f;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .services-list {
            text-align: right;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 35px;
            border: 1px solid rgba(11, 75, 54, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative;
            overflow: hidden;
        }

        .services-list::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--primary-dark-green);
        }

        .services-list p {
            margin: 16px 0;
            color: var(--text-dark);
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .services-list p:hover {
            transform: translateX(-5px);
            color: var(--primary-dark-green);
        }

        .services-list i {
            color: var(--secondary-green);
            margin-left: 15px;
            font-size: 20px;
            width: 25px;
            text-align: center;
        }

        /* Map Styles */
        .map-container {
            width: 100%;
            height: 220px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid #e8f0eb;
        }
        
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Button Styles */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        .btn i {
            margin-left: 15px;
            font-size: 24px;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: scale(1.2);
        }

        .btn-call { background: linear-gradient(135deg, var(--primary-dark-green), #083828); }
        .btn-facebook { background: linear-gradient(135deg, #1877F2, #145dbf); }
        .btn-map { background: linear-gradient(135deg, #EA4335, #c53023); }
        
        .btn-whatsapp { 
            background: linear-gradient(135deg, #25D366, #1da851); 
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .footer-address {
            font-size: 15px;
            font-weight: 600;
            color: #667c70;
            line-height: 1.8;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 26px; }
            .btn { font-size: 16px; padding: 16px 20px; }
            .services-list p { font-size: 15px; }
            .map-container { height: 180px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="animate-item">
            <img src="Code_Generated_Image.png" alt="Alhayah Pharmacy Logo" class="logo">
            <h1>صيدلية الحياة</h1>
            <div class="subtitle">Alhayah Pharmacy</div>
        </div>

        <!-- Services -->
        <div class="services-list animate-item delay-1">
            <p><i class="fa-solid fa-hands-holding-child"></i> صحتك وصحة عائلتك في أيدٍ أمينة</p>
            <p><i class="fa-solid fa-heart-pulse"></i> قياس الضغط والسكر والوزن مجاناً</p>
            <p><i class="fa-solid fa-user-doctor"></i> طبيبك الصيدلي معك أينما كنت ..</p>
            <p><i class="fa-solid fa-house-medical-circle-check"></i> استشرنا وتصلك طلبيتك حتى باب بيتك</p>
        </div>

        <!-- Buttons -->
        <div class="btn-group animate-item delay-2">
            <a href="tel:+201024282500" class="btn btn-call">
                <i class="fa-solid fa-phone"></i> اتصل بنا الآن
            </a>
            
            <a href="https://wa.me/201024282500" class="btn btn-whatsapp" target="_blank">
                <i class="fa-brands fa-whatsapp"></i> تواصل عبر واتساب
            </a>

            <!-- Updated Facebook URL -->
            <a href="https://fb.me/Alhayah.Pharmacy" class="btn btn-facebook" target="_blank">
                <i class="fa-brands fa-facebook-f"></i> صفحتنا على فيسبوك
            </a>

            <!-- Updated Map URL -->
            <a href="https://maps.app.goo.gl/1E3LmN6cdfA2186G7" class="btn btn-map" target="_blank">
                <i class="fa-solid fa-location-dot"></i> احصل على الاتجاهات
            </a>
        </div>

        <!-- Embedded Google Map using provided Coordinates -->
        <div class="map-container animate-item delay-3">
            <iframe 
                src="https://maps.google.com/maps?q=31.30687827460859,31.140829625298146&t=&z=16&ie=UTF8&iwloc=&output=embed" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <!-- Footer -->
        <div class="footer-address animate-item delay-4">
            كفرالشيخ - الحامول<br>
            امام فرقة أمن الحامول
        </div>
    </div>

</body>
</html>
